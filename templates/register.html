<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WuselMap - Registrieren</title>
    
    <!-- Montserrat Font korrekt geladen -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --main-turquois: #083d4d;
            --accent-gold: #c5a043;
            --bg-dark: #052a35;
            --card-bg: #0a4a5c;
            --text-light: #f4e4bc;
        }
        body { 
            margin: 0; 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg-dark); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        .register-box {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid var(--accent-gold);
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            box-sizing: border-box;
        }
        .login-logo {
            max-width: 200px;
            height: auto;
            margin-bottom: 15px;
        }
        h2 {
            color: var(--accent-gold);
            text-transform: uppercase;
            margin-bottom: 25px;
            font-weight: 900;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: left;
        }
        .full-width { grid-column: span 2; }
        
        label {
            font-size: 0.8rem;
            color: var(--accent-gold);
            margin-left: 5px;
        }
        .register-input { 
            width: 100%; 
            padding: 12px; 
            margin-top: 5px;
            border-radius: 10px; 
            border: 2px solid var(--bg-dark); 
            background: var(--main-turquois); 
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
            font-family: inherit;
        }
        .btn-register { 
            width: 100%;
            padding: 18px; 
            border-radius: 12px; 
            border: none; 
            font-weight: bold; 
            background: var(--accent-gold);
            color: var(--bg-dark);
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 25px;
            font-size: 1.1rem;
            font-family: inherit;
            transition: transform 0.1s ease, background 0.2s ease;
        }
        .btn-register:active {
            transform: scale(0.98);
        }
        .back-link {
            margin-top: 20px;
            font-size: 0.9rem;
            color: white;
        }
        .back-link a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: bold;
        }
        .agb-check {
            margin-top: 20px;
            font-size: 0.85rem;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            color: var(--text-light);
            text-align: left;
            padding-left: 5px;
        }
        .agb-check input {
            margin-top: 3px;
            cursor: pointer;
        }

        /* MOBIL-ANPASSUNG */
        @media (max-width: 480px) {
            .register-box {
                padding: 25px 20px;
            }
            .form-grid {
                grid-template-columns: 1fr; /* Schaltet auf einspaltig um */
            }
            .full-width {
                grid-column: span 1;
            }
            h2 {
                font-size: 1.5rem;
                margin-bottom: 20px;
            }
            .btn-register {
                padding: 15px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="register-box">
        <img src="/static/Logo_Wuselmap.png" class="login-logo" alt="Wuselmap Logo">
        <h2>Neue Crew beitreten</h2>

        <form action="/register" method="POST">
            <div class="form-grid">
                <div class="full-width">
                    <label>Benutzername (für den Login)</label>
                    <input type="text" name="username" class="register-input" required placeholder="z.B. CaptainWusel">
                </div>

                <div>
                    <label>Vorname</label>
                    <input type="text" name="vorname" class="register-input" required placeholder="Vorname">
                </div>
                <div>
                    <label>Nachname</label>
                    <input type="text" name="nachname" class="register-input" required placeholder="Nachname">
                </div>

                <div class="full-width">
                    <label>E-Mail Adresse</label>
                    <input type="email" name="email" class="register-input" required placeholder="deine@mail.de">
                </div>

                <div>
                    <label>Passwort</label>
                    <input type="password" name="password" class="register-input" required placeholder="••••••••">
                </div>
                <div>
                    <label>Alter</label>
                    <input type="number" name="alter" class="register-input" required placeholder="z.B. 25">
                </div>
            </div>

            <div class="agb-check">
                <input type="checkbox" id="agb" required>
                <label for="agb" style="color: var(--text-light); font-size: 0.85rem; margin-left: 0; line-height: 1.4;">
                    Ich akzeptiere die <a href="/agb" style="color:var(--accent-gold); font-weight: bold; text-decoration: none;">AGB</a> und Datenschutzregeln.
                </label>
            </div>

            <button type="submit" class="btn-register">Account erstellen</button>
        </form>

        <div class="back-link">
            Doch schon ein Konto? <a href="/">Zum Login</a>
        </div>
    </div>

</body>
</html>
