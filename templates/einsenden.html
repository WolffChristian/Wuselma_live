<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WuselMap - Neuen Spot einreichen</title>
    
    <link rel="stylesheet" href="/static/map_style.css?v=2.0">
    
    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-dark);
        }

        .main-wrapper {
            display: flex;
            height: calc(100vh - var(--header-height));
            width: 100%;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px; 
            display: flex;
            justify-content: center;
            align-items: center; 
            box-sizing: border-box;
        }

        .upload-container {
            width: 100%;
            max-width: 700px; 
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;    
            border: 2px solid var(--accent-gold);
            border-radius: 15px;
            box-sizing: border-box;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); 
        }

        .form-group { margin-bottom: 20px; } 
        .form-group label { display: block; color: var(--accent-gold); margin-bottom: 8px; font-size: 0.95rem; }
        
        .checkbox-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            background: rgba(0,0,0,0.2); 
            padding: 15px; 
            border-radius: 8px; 
        }
        
        .checkbox-grid label { color: white; font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        
        .upload-container .search-box {
            display: block !important;
            width: 100% !important;
            height: 45px !important; 
            box-sizing: border-box !important;
        }

        .form-group .geo-flex {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        .form-group .geo-flex input[name="plz"] { width: 25% !important; }
        .form-group .geo-flex input[name="stadt"] { width: 75% !important; }

        /* Stil für den GPS-Button */
        .btn-gps {
            background: transparent;
            color: var(--accent-gold);
            border: 1px dashed var(--accent-gold);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
            transition: all 0.2s ease;
        }
        .btn-gps:hover {
            background: rgba(197, 160, 67, 0.1);
        }

        /* EXTRA MOBIL-ANPASSUNG FÜR DAS FORMULAR */
        @media (max-width: 768px) {
            .main-content {
                padding: 15px !important;
                align-items: flex-start !important;
            }
            .upload-container {
                padding: 20px !important;
                margin-bottom: 20px;
            }
            .checkbox-grid {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>
<body>

    <header id="top-logo-bar">
        <div class="logo-positioner">
            <img src="/static/Logo_Wuselmap.png" alt="WuselMap Logo" class="main-logo">
        </div>
    </header>

    <div class="main-wrapper">

        <nav id="main-nav">
            <a href="/map" class="nav-item"><span class="nav-icon">🗺️</span><span class="nav-label">Karte</span></a>
            <a href="/einsenden" class="nav-item active"><span class="nav-icon">➕</span><span class="nav-label">Spot melden</span></a>
            <a href="/funk" class="nav-item"><span class="nav-icon">📻</span><span class="nav-label">Funk</span></a>
            <a href="/crew" class="nav-item"><span class="nav-icon">👥</span><span class="nav-label">Crew</span></a>
            <a href="/profil" class="nav-item"><span class="nav-icon">👤</span><span class="nav-label">Profil</span></a>
            <a href="/logout" class="nav-item"><span class="nav-icon">🚪</span><span class="nav-label">Logout</span></a>
        </nav>

        <div class="main-content">
            <div class="upload-container">
                <h2 style="color: var(--accent-gold); margin-top: 0; text-align: center; margin-bottom: 20px;">Spot melden</h2>
                
                <form action="/neuer_spot" method="post" enctype="multipart/form-data">
                    <div class="form-group">
                        <label>Name des Spielplatzes</label>
                        <input type="text" name="name" class="search-box" placeholder="Name..." required>
                    </div>

                    <div class="form-group">
                        <label>Adresse & Ort</label>
                        <input type="text" id="form-adresse" name="adresse" class="search-box" placeholder="Straße / Hausnr. (oder GPS-Daten)" required style="margin-bottom: 5px;">
                        <div class="geo-flex">
                            <input type="text" id="form-plz" name="plz" class="search-box" placeholder="PLZ">
                            <input type="text" id="form-stadt" name="stadt" class="search-box" placeholder="Stadt">
                        </div>
                        <button type="button" class="btn-gps" onclick="holeGPSDaten()">📍 Aktuellen Standort nutzen</button>
                    </div>

                    <div class="form-group">
                        <label>Altersgruppe</label>
                        <select name="alter" class="search-box">
                            <option value="0-3">0-3 Jahre</option>
                            <option value="3-12">3-12 Jahre</option>
                            <option value="Alle">Für alle</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Ausstattung</label>
                        <div class="checkbox-grid">
                            <label><input type="checkbox" name="schatten" value="1"> ⛱️ Schatten</label>
                            <label><input type="checkbox" name="wc" value="1"> 🚽 WC</label>
                            <label><input type="checkbox" name="sitze" value="1"> 🪑 Bänke</label>
                            <label><input type="checkbox" name="parken" value="1"> 🚗 Parken</label>
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 20px; background: rgba(255, 0, 0, 0.1); padding: 15px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.2); box-sizing: border-box;">
                        <label style="color: var(--accent-gold); font-size: 0.8rem; margin-bottom: 10px; font-weight: bold;">Rechtliches & Datenschutz</label>
                        
                        <div style="display: flex; flex-direction: column; gap: 10px;">
                            <label style="color: white; font-weight: normal; font-size: 0.85rem; display: flex; align-items: flex-start; gap: 10px; cursor: pointer;">
                                <input type="checkbox" name="check_personen" required style="margin-top: 4px;">
                                <span>Ich bestätige, dass auf dem Foto <b>keine Personen</b> (besonders keine Kinder) zu erkennen sind.</span>
                            </label>

                            <label style="color: white; font-weight: normal; font-size: 0.85rem; display: flex; align-items: flex-start; gap: 10px; cursor: pointer;">
                                <input type="checkbox" name="check_rechte" required style="margin-top: 4px;">
                                <span>Ich besitze die <b>Urheberrechte</b> an diesem Foto und erlaube der WuselMap, dieses Bild dauerhaft zu nutzen.</span>
                            </label>
                        </div>
                    </div>
                    
                    <input type="hidden" id="v-lat" name="lat">
                    <input type="hidden" id="v-lon" name="lon">

                    <button type="submit" class="btn" style="width: 100%; margin: 20px 0 0 0;">Spot absenden</button>
                </form>
            </div>
        </div>

    </div>

    <script>
        function holeGPSDaten() {
            if (navigator.geolocation) {
                const gpsBtn = document.querySelector('.btn-gps');
                gpsBtn.innerText = "⏳ Suche Signal...";

                navigator.geolocation.getCurrentPosition(
                    (p) => {
                        const lat = p.coords.latitude.toFixed(6);
                        const lon = p.coords.longitude.toFixed(6);
                        
                        document.getElementById('v-lat').value = lat;
                        document.getElementById('v-lon').value = lon;
                        
                        document.getElementById('form-adresse').value = `GPS: ${lat}, ${lon}`;
                        document.getElementById('form-plz').value = "";
                        document.getElementById('form-stadt').value = "Aktueller Standort";
                        
                        gpsBtn.innerText = "✅ Standort erfasst!";
                    },
                    (error) => {
                        console.error(error);
                        gpsBtn.innerText = "❌ Fehler: GPS blockiert";
                        alert("Standortzugriff wurde verweigert oder ist nicht verfügbar.");
                    },
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            } else {
                alert("Dein Browser unterstützt keine Geolocation.");
            }
        }
    </script>
</body>
</html>
